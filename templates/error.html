{% extends "base.html" %}

{% block title %}Error {{ error_code }} | AI Resume Builder & Tracker{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card border-0 shadow-lg text-center p-5 bg-white">
          <div class="card-body">
            <div class="stat-icon bg-danger-subtle text-danger mx-auto mb-3" style="width: 64px; height: 64px; font-size: 2rem;">
              <i class="bi bi-exclamation-triangle-fill" aria-hidden="true"></i>
            </div>
            <p class="text-uppercase text-danger fw-bold small mb-2">Error Code {{ error_code }}</p>
            <h1 class="h3 fw-bold text-dark mb-3">Something Needs Attention</h1>
            <p class="text-secondary mb-4">{{ error_message }}</p>
            <a class="btn btn-primary btn-lg shadow-sm px-4 fw-semibold" href="{{ url_for('main.index') }}">
              <i class="bi bi-house-door me-1" aria-hidden="true"></i> Return to Dashboard
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
