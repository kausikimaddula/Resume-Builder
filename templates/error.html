{% extends "base.html" %}

{% block title %}Error {{ error_code }} | AI Resume Builder & Tracker{% endblock %}

{% block content %}
  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-5 text-center">
              <p class="text-uppercase text-danger fw-semibold small mb-2">Error {{ error_code }}</p>
              <h1 class="h3 fw-bold mb-3">Something needs attention</h1>
              <p class="text-secondary mb-4">{{ error_message }}</p>
              <a class="btn btn-primary" href="{{ url_for('main.index') }}">Return home</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
